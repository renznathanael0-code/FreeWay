<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>StepFree – Accessibility Map</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="splash-screen">
        <h1 class="logo-text">StepFree</h1>
        <div id="sync-status">Verbindung wird aufgebaut...</div>
    </div>

    <div id="map"></div>
    <div id="map-legend" style="position: fixed; bottom: 20px; left: 10px; background: white; padding: 10px; border-radius: 8px; z-index: 1000; box-shadow: 0 0 10px rgba(0,0,0,0.2); font-size: 12px;">
    <strong>Legende</strong><br>
    🪜 Treppe/Stufe<br>
    🛗 Aufzug Defekt<br>
    🚧 Baustelle/Sperrung<br>

    🚽 Barrierefreies WC<br>
    🅿️ Behinderten-Parkplatz<br>
    📍 Barrierefreier Ort
</div>


    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <script src="script.js"></script>

</html>
