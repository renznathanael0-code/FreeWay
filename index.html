<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Freeway Stuttgart</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="map"></div>

    <div class="controls">
        <div class="button-grid">
            <button id="treppen" onclick="sendReport('Treppe', '#E74C3C')">🪜 Treppe</button>
            <button id="defekt" onclick="sendReport('Aufzug defekt', '#E67E22')">🛗 Defekt</button>
            <button id="baustelle" onclick="sendReport('Baustelle', '#F1C40F')">🚧 Bau</button>
        </div>
        <div class="button-grid" style="margin-top: 10px;">
            <button onclick="generateQR()" style="background:#34495e; width: 46%;">QR zeigen</button>
            <button onclick="scanQR()" style="background:#7f8c8d; width: 46%;">Einlesen</button>
        </div>
    </div>

    <div id="qr-overlay" onclick="this.style.display='none'">
        <div id="qrcode"></div>
        <p style="margin-top:20px; color:white;">Zum Schließen tippen</p>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/pouchdb@8.0.1/dist/pouchdb.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
